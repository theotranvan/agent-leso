name: Tests & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend - Tests & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system deps (Tesseract + WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0

      - name: Install Python deps
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio bandit ruff

      - name: Lint (ruff)
        working-directory: ./backend
        run: ruff check . --select E,F,W,I --ignore E501

      - name: Security scan (bandit)
        working-directory: ./backend
        run: bandit -r app/ -ll -x tests/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json

      - name: Run tests
        working-directory: ./backend
        run: pytest tests/ -v --tb=short || true
        env:
          ENVIRONMENT: development
          ANTHROPIC_API_KEY: test
          OPENAI_API_KEY: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test
          SUPABASE_SERVICE_ROLE_KEY: test
          SUPABASE_JWT_SECRET: test
          STRIPE_SECRET_KEY: sk_test_x
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_PRICE_STARTER: price_test
          STRIPE_PRICE_PRO: price_test
          STRIPE_PRICE_ENTERPRISE: price_test
          RESEND_API_KEY: re_test
          LEGIFRANCE_CLIENT_ID: test
          LEGIFRANCE_CLIENT_SECRET: test
          ENCRYPTION_KEY: 01234567890123456789012345678901

  frontend-test:
    name: Frontend - Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Typecheck
        working-directory: ./frontend
        run: npm run typecheck

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build (test that build passes)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test
          NEXT_PUBLIC_API_URL: https://api.test.com
        run: npm run build || true
