# Blueprint Render - BET Agent
# Tous les services en région Frankfurt (EU)

services:
  # API FastAPI
  - type: web
    name: bet-agent-api
    runtime: docker
    region: frankfurt
    plan: standard
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: bet-agent-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: bet-documents
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: LEGIFRANCE_CLIENT_ID
        sync: false
      - key: LEGIFRANCE_CLIENT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false

  # Worker ARQ (tâches async + cron)
  - type: worker
    name: bet-agent-worker
    runtime: docker
    region: frankfurt
    plan: standard
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: arq worker.WorkerSettings
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: bet-agent-redis
          property: connectionString
      - fromGroup: bet-agent-shared
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: bet-documents
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: LEGIFRANCE_CLIENT_ID
        sync: false
      - key: LEGIFRANCE_CLIENT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  # Redis (queue ARQ)
  - type: redis
    name: bet-agent-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
